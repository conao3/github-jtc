query RepositoryLanguages($owner: String!, $name: String!, $first: Int!, $after: String) {
  repository(owner: $owner, name: $name) {
    id
    languages(first: $first, after: $after, orderBy: { field: SIZE, direction: DESC }) {
      pageInfo {
        hasNextPage
        endCursor
      }
      edges {
        size
        node {
          id
          name
          color
        }
      }
    }
  }
}
