query ViewerRepositories($first: Int!, $after: String) {
  viewer {
    repositories(
      first: $first
      after: $after
      affiliations: [OWNER, COLLABORATOR, ORGANIZATION_MEMBER]
      orderBy: { field: PUSHED_AT, direction: DESC }
    ) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        name
        nameWithOwner
        url
        description
        isPrivate
        visibility
        pushedAt
        updatedAt
        viewerPermission
        stargazerCount
        forkCount
        primaryLanguage {
          name
          color
        }
        owner {
          __typename
          login
          avatarUrl(size: 40)
          ... on Organization {
            name
          }
          ... on User {
            name
          }
        }
        issues(states: OPEN) {
          totalCount
        }
        pullRequests(states: OPEN) {
          totalCount
        }
        defaultBranchRef {
          name
          target {
            __typename
            ... on Commit {
              history(first: 1) {
                totalCount
              }
            }
          }
        }
      }
    }
  }
}
