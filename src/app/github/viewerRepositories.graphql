query ViewerRepositories($first: Int!, $after: String) {
  viewer {
    repositories(
      first: $first
      after: $after
      affiliations: [OWNER, COLLABORATOR, ORGANIZATION_MEMBER]
      orderBy: { field: PUSHED_AT, direction: DESC }
    ) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        name
        nameWithOwner
        url
        description
        visibility
        pushedAt
        viewerPermission
        stargazerCount
        forkCount
        primaryLanguage {
          name
        }
        owner {
          login
          ... on Organization {
            name
          }
          ... on User {
            name
          }
        }
        issues(states: OPEN) {
          totalCount
        }
        pullRequests(states: OPEN) {
          totalCount
        }
        defaultBranchRef {
          name
        }
      }
    }
  }
}
