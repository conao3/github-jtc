query RepositoryBranches($owner: String!, $name: String!, $first: Int!, $after: String) {
  repository(owner: $owner, name: $name) {
    id
    refs(
      refPrefix: "refs/heads/"
      first: $first
      after: $after
      orderBy: { field: ALPHABETICAL, direction: ASC }
    ) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        name
        target {
          __typename
          ... on Commit {
            committedDate
            messageHeadline
            author {
              name
              user {
                login
              }
            }
          }
        }
      }
    }
  }
}
