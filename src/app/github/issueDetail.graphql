query IssueDetail(
  $owner: String!
  $name: String!
  $number: Int!
  $labelsFirst: Int!
  $assigneesFirst: Int!
  $timelineFirst: Int!
  $timelineAfter: String
) {
  repository(owner: $owner, name: $name) {
    issue(number: $number) {
      id
      number
      title
      bodyText
      state
      stateReason
      createdAt
      updatedAt
      closedAt
      url
      author {
        login
      }
      comments {
        totalCount
      }
      participants {
        totalCount
      }
      repository {
        nameWithOwner
        url
      }
      milestone {
        title
        dueOn
        progressPercentage
      }
      labels(first: $labelsFirst) {
        totalCount
        nodes {
          id
          name
          color
        }
      }
      assignees(first: $assigneesFirst) {
        totalCount
        nodes {
          login
          url
        }
      }
      timelineItems(
        first: $timelineFirst
        after: $timelineAfter
        itemTypes: [
          ISSUE_COMMENT
          CLOSED_EVENT
          REOPENED_EVENT
          ASSIGNED_EVENT
          UNASSIGNED_EVENT
          LABELED_EVENT
          UNLABELED_EVENT
        ]
      ) {
        pageInfo {
          hasNextPage
          endCursor
        }
        nodes {
          __typename
          ... on IssueComment {
            id
            bodyText
            publishedAt
            url
            author {
              login
            }
          }
          ... on ClosedEvent {
            id
            createdAt
            stateReason
            actor {
              login
            }
          }
          ... on ReopenedEvent {
            id
            createdAt
            stateReason
            actor {
              login
            }
          }
          ... on AssignedEvent {
            id
            createdAt
            actor {
              login
            }
            assignee {
              __typename
              ... on User {
                login
              }
              ... on Bot {
                login
              }
              ... on Organization {
                login
              }
              ... on Mannequin {
                login
              }
            }
          }
          ... on UnassignedEvent {
            id
            createdAt
            actor {
              login
            }
            assignee {
              __typename
              ... on User {
                login
              }
              ... on Bot {
                login
              }
              ... on Organization {
                login
              }
              ... on Mannequin {
                login
              }
            }
          }
          ... on LabeledEvent {
            id
            createdAt
            actor {
              login
            }
            label {
              name
              color
            }
          }
          ... on UnlabeledEvent {
            id
            createdAt
            actor {
              login
            }
            label {
              name
              color
            }
          }
        }
      }
    }
  }
}
