query IssueDetail($owner: String!, $name: String!, $number: Int!, $labelsFirst: Int!, $assigneesFirst: Int!) {
  repository(owner: $owner, name: $name) {
    issue(number: $number) {
      id
      number
      title
      bodyText
      state
      stateReason
      createdAt
      updatedAt
      closedAt
      url
      author {
        login
      }
      comments {
        totalCount
      }
      participants {
        totalCount
      }
      repository {
        nameWithOwner
        url
      }
      milestone {
        title
        dueOn
        progressPercentage
      }
      labels(first: $labelsFirst) {
        totalCount
        nodes {
          id
          name
          color
        }
      }
      assignees(first: $assigneesFirst) {
        totalCount
        nodes {
          login
          url
        }
      }
    }
  }
}
