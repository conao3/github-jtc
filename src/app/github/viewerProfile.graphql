query ViewerProfile(
  $from: DateTime!
  $to: DateTime!
  $organizationsFirst: Int!
  $organizationsAfter: String
  $repositoriesFirst: Int!
  $repositoriesAfter: String
) {
  viewer {
    id
    login
    name
    avatarUrl(size: 160)
    url
    email
    company
    location
    websiteUrl
    bio
    createdAt
    followers {
      totalCount
    }
    following {
      totalCount
    }
    organizations(first: $organizationsFirst, after: $organizationsAfter) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        login
        name
        url
        avatarUrl(size: 40)
      }
    }
    repositories(
      first: $repositoriesFirst
      after: $repositoriesAfter
      affiliations: [OWNER, COLLABORATOR, ORGANIZATION_MEMBER]
      orderBy: { field: PUSHED_AT, direction: DESC }
      isFork: false
    ) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        name
        nameWithOwner
        url
        viewerPermission
        updatedAt
        isPrivate
      }
    }
    contributionsCollection(from: $from, to: $to) {
      totalCommitContributions
      totalPullRequestContributions
      totalIssueContributions
      totalPullRequestReviewContributions
    }
  }
}
