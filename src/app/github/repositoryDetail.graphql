query RepositoryDetail(
  $owner: String!
  $name: String!
  $rootExpression: String!
  $readmeExpression: String!
  $pullRequestsFirst: Int!
  $pullRequestsAfter: String
  $branchesFirst: Int!
  $branchesAfter: String
  $tagsFirst: Int!
  $tagsAfter: String
  $languagesFirst: Int!
  $languagesAfter: String
) {
  repository(owner: $owner, name: $name) {
    id
    name
    nameWithOwner
    url
    description
    homepageUrl
    createdAt
    updatedAt
    pushedAt
    isPrivate
    visibility
    viewerPermission
    stargazerCount
    forkCount
    watchers {
      totalCount
    }
    issues(states: OPEN) {
      totalCount
    }
    openPullRequests: pullRequests(states: OPEN) {
      totalCount
    }
    pullRequests(
      first: $pullRequestsFirst
      after: $pullRequestsAfter
      orderBy: { field: UPDATED_AT, direction: DESC }
    ) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        number
        title
        url
        updatedAt
        state
        isDraft
        reviewDecision
        comments {
          totalCount
        }
        author {
          login
        }
      }
    }
    primaryLanguage {
      name
      color
    }
    languages(first: $languagesFirst, after: $languagesAfter, orderBy: { field: SIZE, direction: DESC }) {
      pageInfo {
        hasNextPage
        endCursor
      }
      edges {
        size
        node {
          id
          name
          color
        }
      }
    }
    owner {
      __typename
      login
      ... on User {
        name
      }
      ... on Organization {
        name
      }
    }
    defaultBranchRef {
      name
      target {
        __typename
        ... on Commit {
          history(first: 1) {
            totalCount
          }
          committedDate
          messageHeadline
          author {
            name
            user {
              login
              avatarUrl(size: 40)
              url
            }
          }
        }
      }
    }
    refs(
      refPrefix: "refs/heads/"
      first: $branchesFirst
      after: $branchesAfter
      orderBy: { field: ALPHABETICAL, direction: ASC }
    ) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        name
        target {
          __typename
          ... on Commit {
            committedDate
            messageHeadline
            author {
              name
              user {
                login
              }
            }
          }
        }
      }
    }
    tagRefs: refs(
      refPrefix: "refs/tags/"
      first: $tagsFirst
      after: $tagsAfter
      orderBy: { field: TAG_COMMIT_DATE, direction: DESC }
    ) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        name
        target {
          __typename
          ... on Commit {
            committedDate
          }
          ... on Tag {
            target {
              __typename
              ... on Commit {
                committedDate
              }
            }
          }
        }
      }
    }
    rootEntries: object(expression: $rootExpression) {
      __typename
      ... on Tree {
        entries {
          name
          type
          oid
          mode
          object {
            __typename
            ... on Blob {
              byteSize
              isBinary
            }
          }
        }
      }
    }
    readme: object(expression: $readmeExpression) {
      __typename
      ... on Blob {
        byteSize
        isBinary
        text
      }
    }
  }
}
