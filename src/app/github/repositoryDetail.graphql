query RepositoryDetail(
  $owner: String!
  $name: String!
  $rootExpression: String!
  $readmeExpression: String!
) {
  repository(owner: $owner, name: $name) {
    id
    name
    nameWithOwner
    url
    description
    homepageUrl
    createdAt
    updatedAt
    pushedAt
    isPrivate
    visibility
    viewerPermission
    stargazerCount
    forkCount
    watchers {
      totalCount
    }
    openIssues: issues(states: OPEN) {
      totalCount
    }
    allIssues: issues(first: 1, states: [OPEN, CLOSED]) {
      totalCount
    }
    openPullRequests: pullRequests(states: OPEN) {
      totalCount
    }
    allPullRequests: pullRequests(first: 1, states: [OPEN, CLOSED, MERGED]) {
      totalCount
    }
    primaryLanguage {
      name
      color
    }
    owner {
      __typename
      login
      ... on User {
        name
      }
      ... on Organization {
        name
      }
    }
    defaultBranchRef {
      name
      target {
        __typename
        ... on Commit {
          history(first: 1) {
            totalCount
          }
          committedDate
          messageHeadline
          author {
            name
            user {
              login
              avatarUrl(size: 40)
              url
            }
          }
        }
      }
    }
    branchRefsSummary: refs(
      refPrefix: "refs/heads/"
      first: 1
      orderBy: { field: ALPHABETICAL, direction: ASC }
    ) {
      totalCount
    }
    tagRefs: refs(refPrefix: "refs/tags/", first: 1, orderBy: { field: TAG_COMMIT_DATE, direction: DESC }) {
      totalCount
    }
    rootEntries: object(expression: $rootExpression) {
      __typename
      ... on Tree {
        entries {
          name
          type
          oid
          mode
          object {
            __typename
            ... on Blob {
              byteSize
              isBinary
            }
          }
        }
      }
    }
    readme: object(expression: $readmeExpression) {
      __typename
      ... on Blob {
        byteSize
        isBinary
        text
      }
    }
  }
}
