query CommitHistory(
  $owner: String!
  $name: String!
  $historyFirst: Int!
  $historyAfter: String
  $tagsFirst: Int!
) {
  repository(owner: $owner, name: $name) {
    id
    name
    nameWithOwner
    url
    pushedAt
    defaultBranchRef {
      name
      target {
        __typename
        ... on Commit {
          history(first: $historyFirst, after: $historyAfter) {
            totalCount
            pageInfo {
              hasNextPage
              endCursor
            }
            nodes {
              id
              oid
              abbreviatedOid
              messageHeadline
              committedDate
              authoredDate
              url
              additions
              deletions
              changedFilesIfAvailable
              author {
                name
                user {
                  login
                }
              }
              associatedPullRequests(first: 1) {
                nodes {
                  id
                  number
                  headRefName
                  url
                }
              }
              parents(first: 2) {
                totalCount
              }
            }
          }
        }
      }
    }
    refs(refPrefix: "refs/tags/", first: $tagsFirst, orderBy: { field: TAG_COMMIT_DATE, direction: DESC }) {
      nodes {
        id
        name
        target {
          __typename
          ... on Commit {
            committedDate
          }
          ... on Tag {
            target {
              __typename
              ... on Commit {
                committedDate
              }
            }
          }
        }
      }
    }
  }
}
