name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-pages.yml"
      - ".env.example"
      - "bun.lock"
      - "index.html"
      - "package.json"
      - "src/**"
      - "vite.config.ts"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Derive Pages base path
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          if [ -n "${PAGES_BASE_PATH}" ]; then
            base_path="${PAGES_BASE_PATH}"
          elif [[ "${repo}" == *.github.io ]]; then
            base_path="/"
          else
            base_path="/${repo}/"
          fi

          echo "VITE_PUBLIC_BASE_PATH=${base_path}" >> "${GITHUB_ENV}"
        env:
          PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_PUBLIC_BASE_PATH: ${{ env.VITE_PUBLIC_BASE_PATH }}
          VITE_GITHUB_APP_CLIENT_ID: ${{ vars.APP_CLIENT_ID }}
          VITE_GITHUB_APP_EXCHANGE_URL: ${{ vars.APP_EXCHANGE_URL }}
          VITE_GITHUB_APP_REDIRECT_URI: ${{ vars.APP_REDIRECT_URI }}

      - name: Add SPA fallback
        run: cp dist/web/index.html dist/web/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
